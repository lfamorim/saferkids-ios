name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./uxplay
      - name: Hadolint (Dockerfile)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: uxplay/Dockerfile
      - name: yamllint
        run: |
          pip install yamllint
          yamllint -d "{extends: relaxed, rules: {line-length: disable}}" k8s/

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build UXPlay
        uses: docker/build-push-action@v6
        with: { context: ./uxplay, push: false, cache-from: type=gha, cache-to: "type=gha,mode=max" }
      - name: Build Monitor
        uses: docker/build-push-action@v6
        with: { context: ./monitor, push: false, cache-from: "type=gha,scope=monitor", cache-to: "type=gha,mode=max,scope=monitor" }
      - name: Build API
        uses: docker/build-push-action@v6
        with: { context: ./api, push: false, cache-from: "type=gha,scope=api", cache-to: "type=gha,mode=max,scope=api" }
