[server]
use-ipv4=yes
use-ipv6=no
ratelimit-interval-usec=1000000
ratelimit-burst=1000
# Advertise on every interface that exists, including wg0 (the WireGuard tun
# created by wg-easy on the host). This is what lets the iPhone see the
# AirPlay receiver while it is connected to the VPN.
allow-interfaces=
deny-interfaces=
disallow-other-stacks=yes

[wide-area]
enable-wide-area=no

[publish]
publish-addresses=yes
publish-hinfo=no
publish-workstation=no
publish-domain=yes
publish-aaaa-on-ipv4=no
publish-a-on-ipv6=no

[reflector]
# A reflector relays mDNS between interfaces; not needed because UXPlay itself
# publishes its records, but kept off by default to avoid mDNS loops.
enable-reflector=no

[rlimits]
