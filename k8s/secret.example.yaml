# Copie este arquivo para `secret.yaml` (gitignored) e preencha os valores.
# Aplique com: kubectl apply -f k8s/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: saferkids-config
  namespace: saferkids
type: Opaque
stringData:
  # Hostname/IP público que o iPhone usará para conectar na VPN.
  WG_HOST: "vpn.example.com"
  # Hash bcrypt gerado por: docker run --rm ghcr.io/wg-easy/wg-easy:14 wgpw 'SuaSenhaForte'
  WG_PASSWORD_HASH: "$2a$12$REPLACE_ME"
  # Nome amigável que aparece no menu "Espelhamento de Tela" do iOS.
  UXPLAY_NAME: "saferkids"
  # Duração de cada arquivo MP4 (segundos).
  SEGMENT_SECONDS: "600"
