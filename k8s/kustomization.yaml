apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: saferkids
resources:
  - namespace.yaml
  - pvc.yaml
  - api.yaml
  - statefulset.yaml
  - services.yaml
  # Aplique secret.yaml separadamente (não versionado).

# Imagens definidas pelo CI via `kustomize edit set image __NAME__=…:SHA`.
images:
  - name: __IMAGE__
    newName: REGION-docker.pkg.dev/PROJECT/saferkids/uxplay
    newTag: latest
  - name: __MONITOR_IMAGE__
    newName: REGION-docker.pkg.dev/PROJECT/saferkids/monitor
    newTag: latest
  - name: __API_IMAGE__
    newName: REGION-docker.pkg.dev/PROJECT/saferkids/api
    newTag: latest
