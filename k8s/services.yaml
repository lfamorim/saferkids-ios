# LoadBalancer GCP para o WireGuard (UDP) — entry point público da VPN.
apiVersion: v1
kind: Service
metadata:
  name: saferkids-vpn
  namespace: saferkids
  annotations:
    cloud.google.com/l4-rbs: "enabled"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app: saferkids
  ports:
    - name: wireguard
      protocol: UDP
      port: 51820
      targetPort: 51820
---
# UI do wg-easy: ClusterIP por padrão (exponha por IAP / Ingress / port-forward).
# Troque para LoadBalancer apenas se for restringir por firewall ao seu IP.
apiVersion: v1
kind: Service
metadata:
  name: saferkids-ui
  namespace: saferkids
spec:
  type: ClusterIP
  selector:
    app: saferkids
  ports:
    - name: ui
      protocol: TCP
      port: 51821
      targetPort: 51821
---
---
# Endpoint HTTPS público do heartbeat (consumido pelo Atalho iOS, fora da VPN).
# Use Ingress + ManagedCertificate (Google) para expor com TLS.
apiVersion: v1
kind: Service
metadata:
  name: saferkids-monitor
  namespace: saferkids
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
spec:
  type: NodePort
  selector:
    app: saferkids
  ports:
    - { name: http, port: 8088, targetPort: 8088 }
---
apiVersion: v1
kind: Service
metadata:
  name: saferkids-headless
  namespace: saferkids
spec:
  clusterIP: None
  selector:
    app: saferkids
  ports:
    - { name: ui, port: 51821, targetPort: 51821 }
